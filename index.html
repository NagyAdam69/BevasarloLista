<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Bevásárló Lista</title>
</head>
<body>
  <div id="myDIV" class="header">

    <h2>Bevásárló Lista</h2>  
    <div class="myInputs">
      <div class="input-group"> <input type="text" id="myInput" placeholder="Termék neve..."></div>
      <div class="input-group"> <input type="text" id="myPrice" placeholder="Termék ára..."></div>
      <div class="input-group"> <input type="text" id="myQuantity" placeholder="Db szám..."></div>
    </div>
    <button onclick="newElement()" class="addBtn">Hozzáadás</button>

  </div>

    <ol id="myUL">
    </ol>
</body>
<script>
    // Create a "close" button and append it to each list item
var myNodelist = document.getElementsByTagName("LI");
var i;
for (i = 0; i < myNodelist.length; i++) {
  var span = document.createElement("SPAN");
  var txt = document.createTextNode("\u00D7");
  span.className = "close";
  span.appendChild(txt);
  myNodelist[i].appendChild(span);
}

// Click on a close button to hide the current list item
var close = document.getElementsByClassName("close");
var i;
for (i = 0; i < close.length; i++) {
  close[i].onclick = function() {
    var div = this.parentElement;
    div.style.display = "none";
  }
}

// Add a "checked" symbol when clicking on a list item
var list = document.querySelector('ol');
list.addEventListener('click', function(ev) {
  if (ev.target.tagName === 'LI') {
    ev.target.classList.toggle('checked');
    console.log(document.querySelectorAll('.checked li'))
  }
}, false);

// Create a new list item when clicking on the "Add" button
function newElement() {
  var li = document.createElement("li");
  var inputValue = document.getElementById("myInput").value;
  var priceValue = document.getElementById("myPrice").value;
  var quantityValue = document.getElementById("myQuantity").value;
  if (!isNaN(quantityValue) && !isNaN(priceValue) && quantityValue != ""){
    
    priceValue = priceValue * quantityValue
    inputValue = `${inputValue}   x${quantityValue}`
  }

  var t = document.createTextNode(inputValue);
  var p = document.createTextNode(" - " + priceValue + " Ft");
  li.appendChild(t);
  li.appendChild(p);
  if (inputValue === '') {
    alert("Muszáj írnod valamit!");
  } else {
  
    if (priceValue === '' || isNaN(priceValue || isNaN(quantityValue))) {
      alert("Érvénytelen input!");
    } else {
      document.getElementById("myUL").appendChild(li);
    }
  }
  document.getElementById("myInput").value = "";
  document.getElementById("myPrice").value = "";
  document.getElementById("myQuantity").value = "";

  var span = document.createElement("SPAN");
  var txt = document.createTextNode("\u00D7");
  span.className = "close";
  span.appendChild(txt);
  li.appendChild(span);

  for (i = 0; i < close.length; i++) {
    close[i].onclick = function() {
      var div = this.parentElement;
      div.style.display = "none";
    }
  }
}
</script>
</html>
